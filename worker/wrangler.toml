name = "sentinel-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# API keys are set as secrets (wrangler secret put)
# For local dev, use worker/.dev.vars

[vars]
# Public traction metrics: count requests in KV (all-time + per-day, 30d TTL)
ENABLE_KV_ANALYTICS = "1"

[observability]
enabled = true

[[kv_namespaces]]
binding = "SENTINEL_KV"
id = "0404ed24f0d94a3498965f3ee2bbffb9"
preview_id = "6615319c926a4836ada7e73634004ffe"

# LP Drain Monitor runs every 15 min for timely rug detection
[triggers]
crons = ["*/15 * * * *"]


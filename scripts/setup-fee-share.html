<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel — Setup $SENT Fee-Share</title>
  <style>
    body { font-family: monospace; background: #0a0a0f; color: #e2e8f0; max-width: 640px; margin: 60px auto; padding: 0 24px; }
    h1 { color: #22d3ee; font-size: 1.2rem; margin-bottom: 4px; }
    p { color: #94a3b8; font-size: 0.85rem; margin: 0 0 24px; }
    button {
      background: #22d3ee; color: #0a0a0f; border: none;
      padding: 10px 20px; font-family: monospace; font-size: 0.9rem;
      cursor: pointer; border-radius: 6px; margin-right: 8px; margin-bottom: 8px;
    }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .card { background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
    .value { font-size: 0.85rem; word-break: break-all; }
    .ok  { color: #22c55e; }
    .err { color: #ef4444; }
    .warn { color: #f59e0b; }
    pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow: auto; font-size: 0.78rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px; }
    td, th { padding: 6px 10px; border: 1px solid #1e293b; text-align: left; }
    th { color: #64748b; font-weight: normal; }
  </style>
</head>
<body>
  <h1>Sentinel — Setup $SENT Fee-Share On-Chain</h1>
  <p>
    Configurează fee-share pentru tokenul <strong>$SENT</strong>
    (<code>Az1LWLGFs63XscCQGeZyn5qVV31SRKtYn53hMB6bBAGS</code>).
    <br>Necesită wallet-ul creator conectat + ~0.01 SOL pentru tx fees.
  </p>

  <button id="btnDetect">1. Conectează wallet</button>
  <div id="walletBtns" style="margin:8px 0"></div>
  <button id="btnBuildTx" disabled>2. Build fee-share tx</button>
  <button id="btnSign" disabled>3. Semnează &amp; trimite</button>

  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>

  <script>
    // ── Config ──────────────────────────────────────────────
    const SENT_MINT       = 'Az1LWLGFs63XscCQGeZyn5qVV31SRKtYn53hMB6bBAGS';
    const TEAM_WALLET     = '2QCjUJ7nUBxpKtG3JJdNkuuNdwzTYuZbotaHaybEQh89';
    const HOLDERS_WALLET  = '4a6fi8i4Lr1TKNMUmProRzr958X4w6ErhCaui92QXFva';
    const BAGS_API        = 'https://public-api-v2.bags.fm/api/v1';
    const SOLANA_RPC      = 'https://mainnet.helius-rpc.com/?api-key=9796ee07-8d1a-467d-bb8f-29a05c993961';
    const SENTINEL_API    = 'https://sentinel-api.apiworkersdev.workers.dev';

    // Fee-share allocations — claimersArray nu permite duplicate public keys
    // Combinăm toate alocările pentru același wallet
    // Team (Creator 40% + Dev Fund 20% + Partner 10%) = 70% | Holders 30%
    const FEE_CLAIMERS = [
      { label: 'Sentinel Team (creator + dev + partner)', wallet: TEAM_WALLET,    bps: 7000 },
      { label: 'Holders Reward',                         wallet: HOLDERS_WALLET, bps: 3000 },
    ];
    // Worker endpoint proxies to Bags API with BAGS_API_KEY server-side
    const FEE_CONFIG_ENDPOINT = `${SENTINEL_API}/v1/token/fee-config`;

    // ── State ───────────────────────────────────────────────
    let connectedWallet = null;
    let pendingTxs = [];

    // ── Helpers ─────────────────────────────────────────────
    function log(html) {
      document.getElementById('log').insertAdjacentHTML('beforeend', `<div class="card">${html}</div>`);
    }

    function bs58Decode(str) {
      const ALPHA = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
      let v = 0n;
      for (const c of str) {
        const d = ALPHA.indexOf(c);
        if (d < 0) throw new Error(`Invalid base58 char: ${c}`);
        v = v * 58n + BigInt(d);
      }
      const bytes = [];
      while (v > 0n) { bytes.unshift(Number(v & 0xffn)); v >>= 8n; }
      for (const c of str) { if (c === '1') bytes.unshift(0); else break; }
      return new Uint8Array(bytes);
    }

    function decodeTxStr(txStr) {
      if (/[+/=]/.test(txStr)) {
        return Uint8Array.from(atob(txStr), c => c.charCodeAt(0));
      }
      return bs58Decode(txStr);
    }

    // ── Detect wallets ───────────────────────────────────────
    const KNOWN_WALLETS = [
      { name: 'Phantom',  provider: () => window.phantom?.solana ?? (window.solana?.isPhantom ? window.solana : null) },
      { name: 'Solflare', provider: () => window.solflare },
      { name: 'Backpack', provider: () => window.backpack?.solana },
      { name: 'Glow',     provider: () => window.glow?.solana },
    ];

    document.getElementById('btnDetect').onclick = () => {
      const container = document.getElementById('walletBtns');
      container.innerHTML = '';

      const found = KNOWN_WALLETS.filter(w => {
        try { return !!w.provider(); } catch { return false; }
      });

      if (found.length === 0) {
        log('<span class="err">Niciun wallet detectat. Instalează Phantom sau Solflare.</span>');
        return;
      }

      for (const w of found) {
        const btn = document.createElement('button');
        btn.textContent = `Conectează ${w.name}`;
        btn.onclick = async () => {
          try {
            const provider = w.provider();
            const resp = await provider.connect();
            connectedWallet = { name: w.name, provider, pubkey: resp.publicKey.toString() };
            log(`<div class="ok">✓ ${w.name} conectat</div>
                 <div class="label" style="margin-top:6px">Wallet</div>
                 <div class="value">${connectedWallet.pubkey}</div>`);
            document.getElementById('btnBuildTx').disabled = false;
          } catch (e) {
            log(`<span class="err">Eroare conectare ${w.name}: ${e.message}</span>`);
          }
        };
        container.appendChild(btn);
      }
    };

    // ── Build tx ─────────────────────────────────────────────
    document.getElementById('btnBuildTx').onclick = async () => {
      if (!connectedWallet) { log('<span class="err">Conectează wallet-ul mai întâi.</span>'); return; }

      log('<div class="warn">⏳ Cerere la Bags API pentru fee-share config...</div>');

      const bpsTotal = FEE_CLAIMERS.reduce((s, c) => s + c.bps, 0);
      if (bpsTotal !== 10000) {
        log(`<span class="err">Eroare: BPS total = ${bpsTotal} (trebuie 10000)</span>`);
        return;
      }

      // Show allocation table
      let tableRows = FEE_CLAIMERS.map(c =>
        `<tr><td>${c.label}</td><td>${c.wallet.slice(0,8)}…${c.wallet.slice(-6)}</td><td>${c.bps} bps (${c.bps/100}%)</td></tr>`
      ).join('');
      log(`<div class="label">Allocări fee-share (token: $SENT)</div>
           <table><tr><th>Label</th><th>Wallet</th><th>Alocare</th></tr>${tableRows}</table>`);

      try {
        const res = await fetch(FEE_CONFIG_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            baseMint: SENT_MINT,
            feeClaimers: FEE_CLAIMERS.map(c => ({ user: c.wallet, userBps: c.bps })),
            payer: connectedWallet.pubkey,
          }),
        });

        const raw = await res.json();
        log(`<div class="label">Raw response</div><pre>${JSON.stringify(raw, null, 2).slice(0, 2000)}</pre>`);

        if (!res.ok || !raw.ok) {
          log(`<span class="err">Eroare: ${raw.error ?? res.status}</span>`);
          return;
        }

        const data = raw.data ?? raw.response ?? raw;

        if (data.needsCreation === false) {
          log('<span class="ok">✓ Fee-share config există deja on-chain — nimic de făcut.</span>');
          return;
        }

        const txList = data.transactions ?? [];
        if (txList.length === 0) {
          log('<span class="warn">API a returnat needsCreation=true dar 0 tranzacții. Verifică răspunsul de mai sus.</span>');
          return;
        }

        pendingTxs = txList;
        log(`<span class="ok">✓ Primit ${txList.length} tranzacție(i) de semnat.</span>`);
        document.getElementById('btnSign').disabled = false;

      } catch (e) {
        log(`<span class="err">Fetch error: ${e.message}</span>`);
      }
    };

    // ── Sign & send ──────────────────────────────────────────
    document.getElementById('btnSign').onclick = async () => {
      if (!connectedWallet || pendingTxs.length === 0) return;

      document.getElementById('btnSign').disabled = true;
      const connection = new solanaWeb3.Connection(SOLANA_RPC, 'confirmed');
      let allOk = true;

      for (let i = 0; i < pendingTxs.length; i++) {
        const txData = pendingTxs[i];
        log(`<div class="warn">⏳ Semnez tx ${i + 1}/${pendingTxs.length}...</div>`);

        try {
          const txBytes = decodeTxStr(txData.tx);
          let tx;
          try {
            tx = solanaWeb3.Transaction.from(txBytes);
          } catch {
            tx = solanaWeb3.VersionedTransaction.deserialize(txBytes);
          }

          const { blockhash } = await connection.getLatestBlockhash('confirmed');
          if (tx.message && tx.message.recentBlockhash !== undefined) {
            tx.recentBlockhash = blockhash;
          } else if (tx.message?.header) {
            // VersionedTransaction — blockhash already set by API
          }

          const signed = await connectedWallet.provider.signTransaction(tx);
          const serialized = signed.serialize();
          const sig = await connection.sendRawTransaction(serialized, {
            skipPreflight: true,
            preflightCommitment: 'processed',
          });

          log(`<span class="ok">✓ Tx ${i + 1} trimis!</span>
               <div class="label" style="margin-top:6px">Signature</div>
               <div class="value"><a href="https://solscan.io/tx/${sig}" target="_blank" style="color:#22d3ee">${sig}</a></div>`);

        } catch (e) {
          log(`<span class="err">Eroare tx ${i + 1}: ${e.message}</span>`);
          allOk = false;
          break;
        }
      }

      if (allOk) {
        log(`<div class="ok" style="font-size:1.1rem;margin-top:8px">🎉 Fee-share config activat cu succes!</div>
             <div style="margin-top:8px;color:#94a3b8;font-size:0.82rem">
               40% creator · 30% holders · 20% dev fund · 10% partner<br>
               Tokenul $SENT va distribui automat fees la fiecare trade pe Bags.
             </div>`);
      } else {
        document.getElementById('btnSign').disabled = false;
      }
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel — Register Bags Partner</title>
  <style>
    body { font-family: monospace; background: #0a0a0f; color: #e2e8f0; max-width: 640px; margin: 60px auto; padding: 0 24px; }
    h1 { color: #22d3ee; font-size: 1.2rem; margin-bottom: 4px; }
    p { color: #94a3b8; font-size: 0.85rem; margin: 0 0 24px; }
    button {
      background: #22d3ee; color: #0a0a0f; border: none;
      padding: 10px 20px; font-family: monospace; font-size: 0.9rem;
      cursor: pointer; border-radius: 6px; margin-right: 8px; margin-bottom: 8px;
    }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .card { background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
    .value { font-size: 0.85rem; word-break: break-all; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
    .warn { color: #f59e0b; }
    pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow: auto; font-size: 0.78rem; }
  </style>
</head>
<body>
  <h1>Sentinel — Register Bags Partner</h1>
  <p>Signs a one-time on-chain tx to register wallet <strong>2QCjUJ7nUBxpKtG3JJdNkuuNdwzTYuZbotaHaybEQh89</strong> as a Bags partner. Requires ~0.001 SOL for tx fees.</p>

  <button id="btnDetect">1. Detectează wallet-uri</button>
  <div id="walletBtns" style="margin:8px 0"></div>
  <button id="btnCheck" disabled>2. Check existing config</button>
  <button id="btnRegister" disabled>3. Register as Partner</button>

  <div id="log"></div>

  <!-- Solana web3.js IIFE bundle + bs58 -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>

  <script>
    const SENTINEL_WALLET = '2QCjUJ7nUBxpKtG3JJdNkuuNdwzTYuZbotaHaybEQh89';
    const API_BASE        = 'https://sentinel-api.apiworkersdev.workers.dev';
    const SOLANA_RPC      = 'https://mainnet.helius-rpc.com/?api-key=9796ee07-8d1a-467d-bb8f-29a05c993961';

    let connectedWallet = null;

    function log(html) {
      document.getElementById('log').insertAdjacentHTML('beforeend', `<div class="card">${html}</div>`);
    }

    /** Minimal base58 decoder (BigInt-based, works in all modern browsers) */
    function bs58Decode(str) {
      const ALPHA = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
      let v = 0n;
      for (const c of str) {
        const d = ALPHA.indexOf(c);
        if (d < 0) throw new Error(`Invalid base58 char: ${c}`);
        v = v * 58n + BigInt(d);
      }
      const bytes = [];
      while (v > 0n) { bytes.unshift(Number(v & 0xffn)); v >>= 8n; }
      for (const c of str) { if (c === '1') bytes.unshift(0); else break; }
      return new Uint8Array(bytes);
    }

    /** Decode tx string — base64 or base58 */
    function decodeTxStr(txStr) {
      // base64 contains +, /, or = padding
      if (/[+/=]/.test(txStr)) {
        return Uint8Array.from(atob(txStr), c => c.charCodeAt(0));
      }
      // base58 (Solana serialized tx)
      return bs58Decode(txStr);
    }

    // ── Detect + Connect ─────────────────────────────────
    const KNOWN_WALLETS = [
      { name: 'Phantom',  provider: () => window.phantom?.solana ?? (window.solana?.isPhantom ? window.solana : null) },
      { name: 'SafePal',  provider: () => window.safepal?.solana ?? (window.solana?.isSafePal ? window.solana : null) },
      { name: 'Solflare', provider: () => window.solflare },
      { name: 'Backpack', provider: () => window.backpack },
      { name: 'Default (window.solana)', provider: () => window.solana },
    ];

    let activeProvider = null;

    document.getElementById('btnDetect').addEventListener('click', () => {
      const container = document.getElementById('walletBtns');
      container.innerHTML = '';
      let found = 0;
      for (const w of KNOWN_WALLETS) {
        const p = w.provider();
        if (!p) continue;
        found++;
        const btn = document.createElement('button');
        btn.textContent = `Conectează cu ${w.name}`;
        btn.style.marginRight = '8px';
        btn.onclick = async () => {
          try {
            const resp = await p.connect();
            connectedWallet = resp.publicKey.toString();
            activeProvider   = p;
            log(`<div class="label">Conectat via ${w.name}</div><div class="value ok">${connectedWallet}</div>`);
            if (connectedWallet !== SENTINEL_WALLET) {
              log(`<span class="warn">⚠ Wallet conectat (${connectedWallet.slice(0,8)}…) diferă de team wallet (${SENTINEL_WALLET.slice(0,8)}…). Asigură-te că ai contul corect selectat în ${w.name}.</span>`);
            }
            document.getElementById('btnCheck').disabled    = false;
            document.getElementById('btnRegister').disabled = false;
          } catch (e) {
            log(`<span class="err">${w.name} connect failed: ${e.message}</span>`);
          }
        };
        container.appendChild(btn);
      }
      if (!found) log('<span class="err">Niciun wallet detectat. Asigură-te că extensia e instalată și deblocată.</span>');
    });

    // ── Check existing config ────────────────────────────
    document.getElementById('btnCheck').addEventListener('click', async () => {
      log('<span class="warn">Checking existing partner config…</span>');
      try {
        const res  = await fetch(`${API_BASE}/v1/partner/${connectedWallet}`);
        const data = await res.json();
        if (data.ok && data.data?.config) {
          log(`<div class="label">Partner config ✅</div><pre>${JSON.stringify(data.data.config, null, 2)}</pre>
               <span class="ok">Already registered! Skip step 3.</span>`);
        } else if (data.ok && data.data?.registered === false) {
          log('<span class="warn">No partner config found yet (TX may still be processing). Wait ~30s and retry.</span>');
        } else {
          log('<span class="warn">No partner config found. Run step 3 to register.</span>');
        }
      } catch (e) {
        log(`<span class="err">Check failed: ${e.message}</span>`);
      }
    });

    // ── Register ─────────────────────────────────────────
    document.getElementById('btnRegister').addEventListener('click', async () => {
      const { Transaction, VersionedTransaction } = solanaWeb3;
      try {
        // 1. Get unsigned tx
        log('<span class="warn">1/3 Fetching unsigned partner registration tx from Bags…</span>');
        const res  = await fetch(`${API_BASE}/v1/partner/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet: connectedWallet }),
        });
        const data = await res.json();
        if (!data.ok || !data.data?.transaction) {
          log(`<span class="err">Failed to get tx: ${JSON.stringify(data)}</span>`);
          return;
        }

        const { transaction: txStr, blockhash: blockhashObj } = data.data;
        const blockhash = blockhashObj?.blockhash ?? blockhashObj;
        log(`<div class="label">Unsigned tx</div><div class="value">${txStr.slice(0, 72)}…</div>
             <div class="label" style="margin-top:6px">Blockhash</div><div class="value">${blockhash}</div>`);

        // 2. Deserialize
        const txBytes = decodeTxStr(txStr);
        let tx;
        try {
          tx = VersionedTransaction.deserialize(txBytes);
        } catch {
          tx = Transaction.from(txBytes);
        }

        // 3. Sign via Phantom
        log('<span class="warn">2/3 Requesting Phantom signature…</span>');
        const signed = await activeProvider.signTransaction(tx);

        // 4. Send to mainnet
        log('<span class="warn">3/3 Sending to Solana mainnet…</span>');
        const raw     = signed.serialize();
        const b64     = btoa(String.fromCharCode(...raw));
        const rpcRes  = await fetch(SOLANA_RPC, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0', id: 1,
            method: 'sendTransaction',
            params: [b64, { encoding: 'base64', maxRetries: 5, skipPreflight: true, preflightCommitment: 'processed' }],
          }),
        });
        const rpcData = await rpcRes.json();

        if (rpcData.error) {
          log(`<span class="err">RPC error: ${JSON.stringify(rpcData.error, null, 2)}</span>`);
          return;
        }

        const sig = rpcData.result;
        log(`<div class="label">Transaction sent ✅</div>
             <div class="value ok" style="margin-bottom:8px">${sig}</div>
             <a href="https://solscan.io/tx/${sig}" target="_blank">View on Solscan →</a>`);
        log(`<span class="ok">Partner registration complete!<br>
             Wallet ${connectedWallet} is now a Bags partner.<br><br>
             Next: update <code>Partner (Bags)</code> wallet in <code>app-store/info.ts</code>
             with the official Bags partner address (check your partner config via step 2).</span>`);

      } catch (e) {
        log(`<span class="err">Registration failed: ${e.message}</span>`);
        console.error(e);
      }
    });
  </script>
</body>
</html>
